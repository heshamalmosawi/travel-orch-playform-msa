---
# Infrastructure Setup Playbook
# Deploys base infrastructure: docker → ssl → vault → databases
# Use this for initial server setup or infrastructure updates

- name: Setup infra for the travel management system
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Display infra setup start message
      ansible.builtin.debug:
        msg: |
          ============================================
          Starting Infrastructure Setup
          ============================================
          Project: {{ project_name | default('Travel Management System') }}
          Host: {{ ansible_hostname }}
          Timestamp: {{ ansible_date_time.iso8601_basic_short }}
          ============================================

    - name: Display infrastructure plan
      ansible.builtin.debug:
        msg: |
          Infrastructure Setup Plan:
          1. Docker     - Verify Docker installation and configuration
          2. SSL        - Deploy TLS certificates
          3. Vault      - Configure secrets management
          4. Databases  - Deploy PostgreSQL and Neo4j

  roles:
    - role: docker
      tags: ['docker', 'infrastructure']

    - role: ssl
      tags: ['ssl', 'infrastructure']

    - role: vault
      tags: ['vault', 'infrastructure']

    - role: databases
      tags: ['databases', 'infrastructure']

  post_tasks:
    - name: Display infra complete message
      ansible.builtin.debug:
        msg: |
          ============================================
          Infrastructure Setup Complete!
          ============================================
          Infrastructure Components:
          - Docker:        Installed and configured
          - SSL Certs:    Deployed to {{ ssl_certs_destination | default('/opt/certs') }}
          - Vault:        Running on port {{ vault_port | default(8200) }}
          - PostgreSQL:    Running on port {{ postgres_port | default(5432) }}
          - Neo4j HTTP:   Running on port {{ neo4j_http_port | default(7474) }}
          - Neo4j Bolt:   Running on port {{ neo4j_bolt_port | default(7687) }}
          ============================================

          Next Steps:
          Run: ansible-playbook ansible/playbooks/deploy_services.yml
          ============================================
