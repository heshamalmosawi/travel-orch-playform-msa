---
# Master Playbook - Complete Travel Management System Deployment
# Deploys all roles in the correct order: docker → ssl → vault → databases → microservices

- name: Deploy the complete travel management system
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Display deployment start message
      ansible.builtin.debug:
        msg: |
          ============================================
          Starting Complete System Deployment
          ============================================
          Project: {{ project_name | default('Travel Management System') }}
          Host: {{ ansible_hostname }}
          Timestamp: {{ ansible_date_time.iso8601_basic_short }}
          ============================================

    - name: Display deployment plan
      ansible.builtin.debug:
        msg: |
          Deployment Plan:
          1. Docker          - Verify Docker installation and configuration
          2. SSL             - Deploy TLS certificates
          3. Vault           - Configure secrets management
          4. Databases       - Deploy PostgreSQL and Neo4j
          5. Microservices   - Deploy all services (includes frontend)

  roles:
    - role: docker
      tags: ['docker', 'infrastructure']

    - role: ssl
      tags: ['ssl', 'infrastructure']

    - role: vault
      tags: ['vault', 'infrastructure']

    - role: databases
      tags: ['databases', 'infrastructure']

    - role: microservices
      tags: ['microservices', 'services']

  post_tasks:
    - name: Display deployment complete message
      ansible.builtin.debug:
        msg: |
          ============================================
          Deployment Complete!
          ============================================
          Services:
          - Eureka Server:   http://localhost:8761
          - API Gateway:     https://localhost:8443
          - Frontend:        http://localhost:4200
          - PostgreSQL:      localhost:5432
          - Neo4j HTTP:      http://localhost:7474
          - Neo4j Bolt:      localhost:7687
          - Vault:           http://localhost:8200
          ============================================
