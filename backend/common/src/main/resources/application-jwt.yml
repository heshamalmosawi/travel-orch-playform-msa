# JWT Configuration
# The secret-key MUST be sourced from HashiCorp Vault in production.
# Vault path: secret/travel-system/jwt (key: "jwt.secret-key")
# For local development without Vault, set JWT_SECRET_KEY environment variable.
jwt:
  secret-key: ${JWT_SECRET_KEY:}
  access-token-expiration-ms: 1800000    # 30 minutes (1800000 ms)
  refresh-token-expiration-ms: 604800000 # 7 days (604800000 ms)
