spring:
  application:
    name: travel-service

  # Vault Configuration
  # JWT secret is sourced from Vault at: secret/travel-system/jwt
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN}
      scheme: http
      kv:
        enabled: true
        backend: secret
        default-context: travel-system
        profiles:
          - jwt

  config:
    import: optional:vault://

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${db.host:localhost}:${db.port:5432}/${db.name:mydatabase}
    username: ${db.user:myuser}
    password: ${db.password:mypassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Neo4j Database
  neo4j:
    uri: bolt://${neo4j.host:localhost}:${neo4j.port:7687}
    authentication:
      username: ${neo4j.user:neo4j}
      password: ${neo4j.password:password123}

server:
  port: 8083

# JWT Configuration
jwt:
  secret-key: ${JWT_SECRET_KEY:your-super-secret-jwt-key-must-be-at-least-512-bits-long-for-hs512-algorithm}
  access-token-expiration-ms: 86400000  # 1 day
  refresh-token-expiration-ms: 604800000  # 7 days
