spring:
  application:
    name: travel-service

  # Vault Configuration
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN}
      scheme: http
      kv:
        enabled: true
        backend: secret
        application-name: ${spring.application.name}

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://${db_host:localhost}:${db_port:5432}/${db_name:mydatabase}
    username: ${db_user:myuser}
    password: ${db_password:mypassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Neo4j Database
  neo4j:
    uri: bolt://${neo4j_host:localhost}:${neo4j_port:7687}
    authentication:
      username: ${neo4j_user:neo4j}
      password: ${neo4j_password:password123}

server:
  port: 0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
