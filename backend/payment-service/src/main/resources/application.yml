spring:
  application:
    name: payment-service

  # Vault Configuration
  # JWT secret is sourced from Vault at: secret/travel-system/jwt
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN}
      scheme: http
      kv:
        enabled: true
        backend: secret
        default-context: travel-system
        profiles:
          - jwt

  config:
    import: optional:vault://

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${db.host:localhost}:${db.port:5432}/${db.name:mydatabase}
    username: ${db.user:myuser}
    password: ${db.password:mypassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8084
