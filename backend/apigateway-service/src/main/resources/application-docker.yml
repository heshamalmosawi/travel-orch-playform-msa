spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/api/user/**
              filters:
                - StripPrefix=2

            - id: payment-service
              uri: http://payment-service:8084
              predicates:
                - Path=/api/payment/**
              filters:
                - StripPrefix=2

            - id: travel-service
              uri: http://travel-service:8083
              predicates:
                - Path=/api/travel/**
              filters:
                - StripPrefix=2
