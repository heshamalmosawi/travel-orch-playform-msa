spring:
  application:
    name: apigateway-service

  # Vault Configuration
  # JWT secret is sourced from Vault at: secret/travel-system/jwt
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_URI:http://localhost:8200}
      token: ${VAULT_TOKEN}
      scheme: http
      kv:
        enabled: true
        backend: secret
        default-context: travel-system
        profiles:
          - jwt

    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/user/**
              filters:
                - StripPrefix=2

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payment/**
              filters:
                - StripPrefix=2

            - id: travel-service
              uri: lb://travel-service
              predicates:
                - Path=/api/travel/**
              filters:
                - StripPrefix=2

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

  config:
    import: optional:vault://

server:
  port: 8443
  ssl:
    key-store: classpath:spring-dev.p12
    key-store-password: esouq123
    key-store-type: PKCS12
    key-alias: esouq
    enabled: true
    protocol: TLS
    enabled-protocols: TLSv1.2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Rate Limiting Configuration (optional, defaults provided)
rate:
  limit:
    capacity: ${RATE_LIMIT_CAPACITY:10}
    duration: ${RATE_LIMIT_DURATION:60}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG