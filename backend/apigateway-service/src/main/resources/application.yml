spring:
  application:
    name: apigateway-service

server:
  port: 8443
  ssl:
    key-store: classpath:spring-dev.p12
    key-store-password: esouq123
    key-store-type: PKCS12
    key-alias: esouq
    enabled: true
    protocol: TLS
    enabled-protocols: TLSv1.2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

spring.cloud.gateway:
  globalcors:
    corsConfigurations:
      '[/**]':
        allow-credentials: true
        allowed-origins: "https://*"
        allowed-headers: "*"
        allowed-methods: "*"

  routes:
    - id: payment-service
      uri: lb://payment-service
      predicates:
        - Path=/api/payment/**

    - id: travel-service
      uri: lb://travel-service
      predicates:
        - Path=/api/travel/**

    - id: user-service
      uri: lb://user-service
      predicates:
        - Path=/api/user/**

  discovery:
    locator:
      enabled: true
      lower-case-service-id: true

# Rate Limiting Configuration (optional, defaults provided)
rate:
  limit:
    capacity: ${RATE_LIMIT_CAPACITY:10}
    duration: ${RATE_LIMIT_DURATION:60}
