spring:
  application:
    name: apigateway-service

  cloud:

    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/user/**
              filters:
                - StripPrefix=2

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/payment/**
              filters:
                - StripPrefix=2

            - id: travel-service
              uri: ${TRAVEL_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/travel/**
              filters:
                - StripPrefix=2

server:
  port: 8443
  ssl:
    key-store: classpath:spring-dev.p12
    key-store-password: esouq123
    key-store-type: PKCS12
    key-alias: esouq
    enabled: true
    protocol: TLS
    enabled-protocols: TLSv1.2

# Rate Limiting Configuration (optional, defaults provided)
rate:
  limit:
    capacity: ${RATE_LIMIT_CAPACITY:10}
    duration: ${RATE_LIMIT_DURATION:60}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO